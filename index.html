<!DOCTYPE html>
<html>
<head>
    <title>Online Fruit Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍎 Online Fruit Store</h1>
</header>

<div class="fruits">

<div class="card">
<h2>Apple</h2>
<p>Price: ₹120</p>
<button onclick="addCart('Apple',120)">Add to Cart</button>
</div>

<div class="card">
<h2>Banana</h2>
<p>Price: ₹60</p>
<button onclick="addCart('Banana',60)">Add to Cart</button>
</div>

<div class="card">
<h2>Orange</h2>
<p>Price: ₹90</p>
<button onclick="addCart('Orange',90)">Add to Cart</button>
</div>

<div class="card">
<h2>Mango</h2>
<p>Price: ₹150</p>
<button onclick="addCart('Mango',150)">Add to Cart</button>
</div>

</div>

<h2>Total Price: ₹<span id="total">0</span></h2>

<script src="script.js"></script>

</body>
</html>
